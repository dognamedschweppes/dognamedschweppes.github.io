<div class="banner-footer">
    <img src="" id="header-left">
    <img src="../media/images/ui/banner-footer.gif">
    <img src="" id="header-right">
</div>
<script>
    const setRandomImg = (id) => {
        document.getElementById(id).src = "../media/images/ui/header-" + (Math.floor(Math.random() * 5) + 1) + ".gif";
    };
    setRandomImg('header-left');
    setRandomImg('header-right');
</script>
<div class="news-footer">
    <div class="last-page">
        <div class="last-page-header">
            <span data-i18n="last_pages_title">ПОСЛЕДНИЕ СТРАНИЦЫ</span>
        </div>
        <div class="last-page-content" id="last-pages-list"></div>
    </div>
    <script>
        const pages = [
            { title: "Егор: Осмотреть комод.", date: "18.04.2026", url: "00008" },
            { title: "Егор: Порыться в мусорке.", date: "17.04.2026", url: "00007" },
            { title: "Егор: Изучить плакат Берсерка.", date: "16.04.2026", url: "00006" },
            { title: "Егор: Изучить плакат с волком.", date: "15.04.2026", url: "00005" },
            { title: "Осмотреть комнату.", date: "14.04.2026", url: "00004" },
            { title: "Вторая попытка.", date: "13.04.2026", url: "00003" },
            { title: "Введите имя.", date: "12.04.2026", url: "00002" },
            { title: "DogNamedSchweppes", date: "12.04.2026", url: "00001" }
        ];

        const listContainer = document.getElementById('last-pages-list');
        pages.forEach(page => {
            const entry = document.createElement('div');
            entry.className = 'last-page-entry';
            entry.innerHTML = `${page.date} - <a href="${page.url}" class="last-page-link">"${page.title}"</a>`;
            listContainer.appendChild(entry);
        });
    </script>
    <div class="news-page">
        <img src="" id="news-img">
        <div class="news-entry">
            <div class="news-info">
                <span data-i18n="news_published">Опубликовано</span> <span id="news-date">17.04.2026</span>
            </div>
            <div class="news-content">
                <span id="news-text" data-i18n="news_text"></span>
            </div>
        </div>
    </div>
    <script>
        window.updateNews = function() {
            const lang = localStorage.getItem('language') || 'ru';
            const newsImg = document.getElementById('news-img');
            if (newsImg) {
                newsImg.src = `../media/images/ui/${lang}/news.gif`;
            }
        }
        updateNews();
    </script>
    <div class="comments-page">
        <div id="comments-container"></div>
    </div>
</div>
