    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-text" class="lightbox-description"></div>
        </div>
    </div>

    <script>
        // Создаём аудио один раз при загрузке страницы
        const yeeHawAudio = new Audio('../media/sounds/yee-haw.mp3');

        function openLightbox(element) {
            // Находим картинку и текст внутри кликнутого элемента
            const img = element.querySelector('img');
            const text = element.querySelector('.fan-arts-text').innerHTML;

            // Вставляем в lightbox
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox-text').innerHTML = text;

            // Показываем lightbox
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function playYeeHaw(event) {
            event.stopPropagation();

            // Останавливаем и перематываем в начало
            yeeHawAudio.pause();
            yeeHawAudio.currentTime = 0;
            yeeHawAudio.play();
        }
    </script>
