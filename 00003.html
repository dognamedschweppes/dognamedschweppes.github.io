<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>DogNamedSchweppes</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link rel="icon" href="../media/images/ui/favicon.gif">
    <script src="../assets/js/loader.js" defer></script>
</head>
<body>
    <center>
        <div id="header-placeholder"></div>

        <div class="wrapper">
            <main class="main">
                <div class="page">
                    <!-- ТУТ ТОЛЬКО УНИКАЛЬНЫЙ КОНТЕНТ СТРАНИЦЫ -->
                    <div class="text-card">Вторая попытка.</div>
                    <div class="panel-container">
                        <img src="../media/images/panels/00003.gif" class="panel">
                    </div>
                    <div class="text">
                        <span></span>
                    </div>
                    <div class="nav">
                        <span>> </span><a href="00004">Осмотреть комнату.</a>
                    </div>
                    <div class="data-button">
                        <span>
                            <a href="00001">Сначала</a> |
                            <a href="javascript:history.back()">Назад</a>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <a href="#" onclick="saveGame(); return false;">Сохранить игру</a>
                            <div class="tooltip">(?)
                                <span class="tooltiptext">
                                    <div class="tooltip-text">
                                        Создает постоянную закладку на этой странице.
                                    </div>
                                </span>
                            </div> |

                            <a href="#" id="autosave-text" onclick="toggleAutosave(); return false;">Автосохранение!</a>
                            <div class="tooltip">
                                (<span id="autosave-icon">?</span>)
                                <span class="tooltiptext">
                                    <div class="tooltip-text">
                                        Нажмите "Автосохранение!", чтобы включить/выключить автоматическую запись прогресса.
                                    </div>
                                </span>
                            </div>

                            |

                            <a href="#" onclick="loadGame(); return false;">Загрузить игру</a> |
                            <a href="#" onclick="deleteSave(); return false;">Удалить игру</a>
                        </span>
                    </div>

                </div>
            </main>
        </div>

        <div id="footer-placeholder"></div>
    </center>
</body>

</html>
